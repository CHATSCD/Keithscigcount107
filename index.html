<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunt's Cig Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0392b;
    --red-dark: #96231a;
    --red-light: #e74c3c;
    --navy: #0f1f38;
    --navy-mid: #1a3157;
    --blue: #1e4080;
    --tan: #f0e9d6;
    --tan-dark: #d9cdb3;
    --white: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --success: #16a34a;
    --success-bg: #dcfce7;
    --border: #ddd6c8;
    --shadow: 0 2px 12px rgba(15,31,56,0.12);
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘DM Sans’, sans-serif;
background: #f5f0e8;
color: var(–text);
min-height: 100vh;
}

/* HEADER */
header {
background: linear-gradient(135deg, var(–navy) 0%, var(–blue) 60%, var(–red) 100%);
color: white;
padding: 0;
position: sticky;
top: 0;
z-index: 100;
box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.header-inner {
display: flex;
align-items: center;
justify-content: space-between;
padding: 12px 20px;
}
.header-title {
font-family: ‘Bebas Neue’, cursive;
font-size: 26px;
letter-spacing: 2px;
line-height: 1;
}
.header-sub {
font-size: 11px;
opacity: 0.75;
letter-spacing: 1px;
text-transform: uppercase;
}
.header-stats {
display: flex;
gap: 16px;
font-family: ‘DM Mono’, monospace;
font-size: 12px;
text-align: center;
}
.hstat {
background: rgba(255,255,255,0.12);
padding: 6px 12px;
border-radius: 8px;
border: 1px solid rgba(255,255,255,0.2);
}
.hstat-val { font-size: 18px; font-weight: 500; display: block; }
.hstat-lbl { opacity: 0.7; font-size: 10px; text-transform: uppercase; }

/* CONTROLS */
.controls {
background: white;
border-bottom: 2px solid var(–tan-dark);
padding: 12px 20px;
display: flex;
gap: 10px;
flex-wrap: wrap;
align-items: center;
}
.search-wrap {
flex: 1;
min-width: 200px;
position: relative;
}
.search-wrap input {
width: 100%;
padding: 8px 12px 8px 36px;
border: 2px solid var(–border);
border-radius: 8px;
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
background: var(–tan);
outline: none;
transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(–blue); background: white; }
.search-icon {
position: absolute;
left: 10px;
top: 50%;
transform: translateY(-50%);
color: var(–muted);
font-size: 16px;
}
select {
padding: 8px 12px;
border: 2px solid var(–border);
border-radius: 8px;
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
background: var(–tan);
cursor: pointer;
outline: none;
}
select:focus { border-color: var(–blue); }
.btn {
padding: 8px 16px;
border-radius: 8px;
font-family: ‘DM Sans’, sans-serif;
font-size: 13px;
font-weight: 600;
cursor: pointer;
border: none;
transition: all 0.15s;
}
.btn-red { background: var(–red); color: white; }
.btn-red:hover { background: var(–red-dark); transform: translateY(-1px); }
.btn-navy { background: var(–navy); color: white; }
.btn-navy:hover { background: var(–navy-mid); }
.btn-outline { background: white; color: var(–navy); border: 2px solid var(–navy); }
.btn-outline:hover { background: var(–navy); color: white; }

/* BRAND SECTIONS */
.main { padding: 16px 20px; max-width: 1400px; margin: 0 auto; }

.brand-section {
margin-bottom: 20px;
border-radius: 12px;
overflow: hidden;
box-shadow: var(–shadow);
border: 1px solid var(–border);
background: white;
}
.brand-header {
padding: 10px 16px;
display: flex;
justify-content: space-between;
align-items: center;
cursor: pointer;
user-select: none;
background: linear-gradient(90deg, var(–navy) 0%, var(–navy-mid) 100%);
color: white;
}
.brand-header:hover { filter: brightness(1.1); }
.brand-name {
font-family: ‘Bebas Neue’, cursive;
font-size: 20px;
letter-spacing: 1.5px;
}
.brand-meta { display: flex; gap: 16px; align-items: center; font-size: 12px; }
.brand-totals {
display: flex;
gap: 8px;
font-family: ‘DM Mono’, monospace;
font-size: 12px;
}
.btag {
background: rgba(255,255,255,0.15);
padding: 3px 8px;
border-radius: 4px;
border: 1px solid rgba(255,255,255,0.25);
}
.btag.red { background: rgba(192,57,43,0.6); }
.chevron { transition: transform 0.2s; font-size: 14px; }
.brand-section.collapsed .chevron { transform: rotate(-90deg); }
.brand-section.collapsed .items-table { display: none; }

/* TABLE */
.items-table { width: 100%; border-collapse: collapse; }
.items-table thead tr {
background: var(–tan);
border-bottom: 2px solid var(–tan-dark);
}
.items-table th {
padding: 8px 12px;
font-size: 11px;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 0.8px;
color: var(–navy);
text-align: left;
}
.items-table th.num { text-align: center; }
.items-table tbody tr {
border-bottom: 1px solid #f0ebe0;
transition: background 0.1s;
}
.items-table tbody tr:hover { background: #faf6ee; }
.items-table td {
padding: 8px 12px;
font-size: 13px;
vertical-align: middle;
}
.item-name {
font-weight: 500;
color: var(–text);
font-size: 13px;
}
.item-sku {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
color: var(–muted);
display: block;
}
.tier-badge {
display: inline-block;
padding: 2px 7px;
border-radius: 4px;
font-size: 10px;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 0.5px;
}
.tier-premium { background: #fef3c7; color: #92400e; }
.tier-generic { background: #dbeafe; color: #1e40af; }
.tier-sub { background: #f3e8ff; color: #6b21a8; }

/* COUNT INPUTS */
.count-cell { text-align: center; }
.count-group {
display: inline-flex;
flex-direction: column;
gap: 3px;
align-items: center;
}
.count-row {
display: flex;
align-items: center;
gap: 4px;
}
.count-lbl {
font-size: 9px;
font-weight: 600;
text-transform: uppercase;
color: var(–muted);
width: 28px;
text-align: right;
}
input[type=“number”] {
width: 48px;
padding: 4px 6px;
border: 1px solid var(–border);
border-radius: 5px;
font-family: ‘DM Mono’, monospace;
font-size: 13px;
text-align: center;
background: var(–tan);
outline: none;
transition: border-color 0.15s, background 0.15s;
-moz-appearance: textfield;
}
input[type=“number”]::-webkit-inner-spin-button,
input[type=“number”]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type=“number”]:focus { border-color: var(–blue); background: white; }
.shelf-input:focus { border-color: var(–red); }

/* TOTALS CELLS */
.total-cell {
text-align: center;
font-family: ‘DM Mono’, monospace;
}
.total-packs {
font-size: 16px;
font-weight: 500;
color: var(–navy);
}
.total-ctns {
font-size: 11px;
color: var(–muted);
}
.total-breakdown {
font-size: 10px;
color: var(–muted);
margin-top: 2px;
}

/* ADD FORM */
.add-form-wrap {
background: white;
border: 2px dashed var(–tan-dark);
border-radius: 12px;
padding: 20px;
margin-bottom: 20px;
display: none;
}
.add-form-wrap.open { display: block; }
.add-form-title {
font-family: ‘Bebas Neue’, cursive;
font-size: 20px;
color: var(–navy);
margin-bottom: 14px;
letter-spacing: 1px;
}
.form-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
gap: 12px;
margin-bottom: 14px;
}
.form-field label {
display: block;
font-size: 11px;
font-weight: 600;
text-transform: uppercase;
color: var(–navy);
margin-bottom: 4px;
letter-spacing: 0.5px;
}
.form-field input, .form-field select {
width: 100%;
padding: 8px 10px;
border: 2px solid var(–border);
border-radius: 8px;
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
background: var(–tan);
outline: none;
}
.form-field input:focus, .form-field select:focus { border-color: var(–blue); background: white; }
.form-actions { display: flex; gap: 10px; }

/* SUMMARY BAR */
.summary-bar {
background: var(–navy);
color: white;
padding: 12px 20px;
display: grid;
grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
gap: 12px;
margin-bottom: 16px;
border-radius: 10px;
}
.sbar-item { text-align: center; }
.sbar-val { font-family: ‘Bebas Neue’, cursive; font-size: 28px; color: var(–tan); line-height: 1; }
.sbar-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; }

/* EMPTY */
.empty-row td {
text-align: center;
padding: 24px;
color: var(–muted);
font-style: italic;
}

/* PRINT */
@media print {
header, .controls, .add-form-wrap, .btn { display: none !important; }
.brand-section.collapsed .items-table { display: table !important; }
body { background: white; }
.brand-header { background: #333 !important; -webkit-print-color-adjust: exact; }
.summary-bar { background: #333 !important; -webkit-print-color-adjust: exact; }
}

.date-stamp {
font-size: 11px;
opacity: 0.6;
font-family: ‘DM Mono’, monospace;
}

.hidden { display: none !important; }
</style>

</head>

      </div>
      <div class="hstat">
        <span class="hstat-val" id="hdr-items">0</span>
        <span class="hstat-lbl">SKUs</span>
      </div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search brands, SKUs..." oninput="filterItems()">
  </div>
  <select id="filter-brand" onchange="filterItems()">
    <option value="">All Brands</option>
  </select>
  <select id="filter-tier" onchange="filterItems()">
    <option value="">All Tiers</option>
    <option value="PREMIUM">Premium</option>
    <option value="GENERIC">Generic</option>
    <option value="SUB GENERIC">Sub Generic</option>
  </select>
  <button class="btn btn-red" onclick="toggleAddForm()">+ Add Item</button>
  <button class="btn btn-navy" onclick="printInventory()">🖨 Print</button>
  <button class="btn btn-outline" onclick="resetAll()">Reset Counts</button>
  <span class="date-stamp" id="date-display"></span>
</div>

<div class="main">

  <!-- ADD FORM -->

  <div class="add-form-wrap" id="add-form">
    <div class="add-form-title">Add New Item</div>
    <div class="form-grid">
      <div class="form-field">
        <label>Brand Group</label>
        <input type="text" id="f-brand" placeholder="e.g. MARLBORO" list="brand-list">
        <datalist id="brand-list"></datalist>
      </div>
      <div class="form-field">
        <label>Item Name</label>
        <input type="text" id="f-name" placeholder="e.g. MARLBORO GOLD KS BOX">
      </div>
      <div class="form-field">
        <label>SKU / Item #</label>
        <input type="text" id="f-sku" placeholder="e.g. 10383597">
      </div>
      <div class="form-field">
        <label>Tier</label>
        <select id="f-tier">
          <option value="PREMIUM">Premium</option>
          <option value="GENERIC">Generic</option>
          <option value="SUB GENERIC">Sub Generic</option>
        </select>
      </div>
      <div class="form-field">
        <label>Storage Packs</label>
        <input type="number" id="f-storage" value="0" min="0">
      </div>
      <div class="form-field">
        <label>Shelf Packs</label>
        <input type="number" id="f-shelf" value="0" min="0">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-red" onclick="addItem()">Add to Inventory</button>
      <button class="btn btn-outline" onclick="toggleAddForm()">Cancel</button>
    </div>
  </div>

  <!-- SUMMARY -->

  <div class="summary-bar" id="summary-bar">
    <div class="sbar-item">
      <div class="sbar-val" id="sum-total-packs">0</div>
      <div class="sbar-lbl">Total Packs</div>
    </div>
    <div class="sbar-item">
      <div class="sbar-val" id="sum-total-ctns">0</div>
      <div class="sbar-lbl">Total Cartons</div>
    </div>
    <div class="sbar-item">
      <div class="sbar-val" id="sum-storage-packs">0</div>
      <div class="sbar-lbl">Storage Packs</div>
    </div>
    <div class="sbar-item">
      <div class="sbar-val" id="sum-shelf-packs">0</div>
      <div class="sbar-lbl">Shelf Packs</div>
    </div>
    <div class="sbar-item">
      <div class="sbar-val" id="sum-storage-ctns">0</div>
      <div class="sbar-lbl">Storage Cartons</div>
    </div>
    <div class="sbar-item">
      <div class="sbar-val" id="sum-shelf-ctns">0</div>
      <div class="sbar-lbl">Shelf Cartons</div>
    </div>
  </div>

  <!-- INVENTORY SECTIONS -->

  <div id="inventory-container"></div>

</div>

let nextId = 200;

// ============================================================
//  HELPERS
// ============================================================
function packs(item) { return (item.storage || 0) + (item.shelf || 0); }
function ctns(p) { return (p / 10).toFixed(1); }
function brandGroups() {
  const groups = {};
  inventory.forEach(item => {
    if (!groups[item.brand]) groups[item.brand] = [];
    groups[item.brand].push(item);
  });
  return groups;
}
function tierClass(t) {
  if (t === 'PREMIUM') return 'tier-premium';
  if (t === 'GENERIC' || t === 'SUB GENERIC') return 'tier-generic';
  return 'tier-sub';
}

// ============================================================
//  RENDER
// ============================================================
function render() {
  updateBrandFilter();
  renderInventory();
  updateSummary();
  updateHeader();
  document.getElementById('date-display').textContent = new Date().toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', year:'numeric'});
}

function updateBrandFilter() {
  const sel = document.getElementById('filter-brand');
  const cur = sel.value;
  const brands = [...new Set(inventory.map(i => i.brand))].sort();
  sel.innerHTML = '<option value="">All Brands</option>' + brands.map(b => `<option value="${b}" ${b===cur?'selected':''}>${b}</option>`).join('');

  // datalist for add form
  const dl = document.getElementById('brand-list');
  dl.innerHTML = brands.map(b => `<option value="${b}">`).join('');
}

function renderInventory() {
  const search = document.getElementById('search').value.toLowerCase();
  const brandFilter = document.getElementById('filter-brand').value;
  const tierFilter = document.getElementById('filter-tier').value;

  let items = inventory.filter(item => {
    if (brandFilter && item.brand !== brandFilter) return false;
    if (tierFilter && item.tier !== tierFilter) return false;
    if (search && !item.name.toLowerCase().includes(search) && !item.sku.includes(search) && !item.brand.toLowerCase().includes(search)) return false;
    return true;
  });

  // Group by brand
  const groups = {};
  items.forEach(item => {
    if (!groups[item.brand]) groups[item.brand] = [];
    groups[item.brand].push(item);
  });

  const container = document.getElementById('inventory-container');
  if (Object.keys(groups).length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">No items found.</div>';
    return;
  }

  container.innerHTML = Object.keys(groups).sort().map(brand => {
    const brandItems = groups[brand];
    const totalPacks = brandItems.reduce((s, i) => s + packs(i), 0);
    const storagePacks = brandItems.reduce((s, i) => s + (i.storage || 0), 0);
    const shelfPacks = brandItems.reduce((s, i) => s + (i.shelf || 0), 0);

    const rows = brandItems.map(item => {
      const total = packs(item);
      return `
        <tr>
          <td>
            <span class="item-name">${item.name}</span>
            <span class="item-sku">${item.sku}</span>
          </td>
          <td><span class="tier-badge ${tierClass(item.tier)}">${item.tier}</span></td>
          <td class="count-cell">
            <div class="count-group">
              <div class="count-row">
                <span class="count-lbl">Packs</span>
                <input type="number" class="storage-input" min="0" value="${item.storage || 0}" 
                  onchange="updateCount(${item.id}, 'storage', this.value)" 
                  style="border-color: #1e4080;">
              </div>
              <div class="count-row" style="font-size:9px;color:#6b7280;">
                = ${ctns(item.storage || 0)} ctns
              </div>
            </div>
          </td>
          <td class="count-cell">
            <div class="count-group">
              <div class="count-row">
                <span class="count-lbl">Packs</span>
                <input type="number" class="shelf-input" min="0" value="${item.shelf || 0}" 
                  onchange="updateCount(${item.id}, 'shelf', this.value)"
                  style="border-color: #c0392b;">
              </div>
              <div class="count-row" style="font-size:9px;color:#6b7280;">
                = ${ctns(item.shelf || 0)} ctns
              </div>
            </div>
          </td>
          <td class="total-cell">
            <div class="total-packs">${total}</div>
            <div class="total-ctns">${ctns(total)} ctns</div>
            <div class="total-breakdown" style="color:#1e4080;">📦 ${item.storage||0} + 🏪 ${item.shelf||0}</div>
          </td>
          <td>
            <button onclick="removeItem(${item.id})" style="background:none;border:none;cursor:pointer;color:#c0392b;font-size:16px;padding:4px;" title="Remove">✕</button>
          </td>
        </tr>`;
    }).join('');

    return `
      <div class="brand-section" id="brand-${brand.replace(/\s+/g,'_')}">
        <div class="brand-header" onclick="toggleBrand(this)">
          <span class="brand-name">${brand}</span>
          <div class="brand-meta">
            <div class="brand-totals">
              <span class="btag">${brandItems.length} SKUs</span>
              <span class="btag">📦 ${storagePacks}pk / ${ctns(storagePacks)} ctn</span>
              <span class="btag red">🏪 ${shelfPacks}pk / ${ctns(shelfPacks)} ctn</span>
              <span class="btag">TOTAL: ${totalPacks}pk / ${ctns(totalPacks)} ctn</span>
            </div>
            <span class="chevron">▾</span>
          </div>
        </div>
        <table class="items-table">
          <thead>
            <tr>
              <th>Product</th>
              <th>Tier</th>
              <th class="num">📦 STORAGE</th>
              <th class="num">🏪 SHELF</th>
              <th class="num">TOTAL</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }).join('');
}

function updateSummary() {
  const totalPacks = inventory.reduce((s, i) => s + packs(i), 0);
  const storagePacks = inventory.reduce((s, i) => s + (i.storage || 0), 0);
  const shelfPacks = inventory.reduce((s, i) => s + (i.shelf || 0), 0);

  document.getElementById('sum-total-packs').textContent = totalPacks;
  document.getElementById('sum-total-ctns').textContent = (totalPacks/10).toFixed(1);
  document.getElementById('sum-storage-packs').textContent = storagePacks;
  document.getElementById('sum-shelf-packs').textContent = shelfPacks;
  document.getElementById('sum-storage-ctns').textContent = (storagePacks/10).toFixed(1);
  document.getElementById('sum-shelf-ctns').textContent = (shelfPacks/10).toFixed(1);
}

function updateHeader() {
  const totalPacks = inventory.reduce((s, i) => s + packs(i), 0);
  document.getElementById('hdr-total-packs').textContent = totalPacks;
  document.getElementById('hdr-total-ctns').textContent = (totalPacks/10).toFixed(1);
  document.getElementById('hdr-items').textContent = inventory.length;
}

// ============================================================
//  ACTIONS
// ============================================================
function updateCount(id, field, val) {
  const item = inventory.find(i => i.id === id);
  if (item) {
    item[field] = parseInt(val) || 0;
    updateSummary();
    updateHeader();
    // Re-render just the brand section
    render();
  }
}

function toggleBrand(header) {
  header.closest('.brand-section').classList.toggle('collapsed');
}

function toggleAddForm() {
  document.getElementById('add-form').classList.toggle('open');
}

function addItem() {
  const brand = document.getElementById('f-brand').value.trim().toUpperCase();
  const name = document.getElementById('f-name').value.trim().toUpperCase();
  const sku = document.getElementById('f-sku').value.trim();
  const tier = document.getElementById('f-tier').value;
  const storage = parseInt(document.getElementById('f-storage').value) || 0;
  const shelf = parseInt(document.getElementById('f-shelf').value) || 0;

  if (!brand || !name) { alert('Brand and Item Name are required.'); return; }

  inventory.push({ id: nextId++, brand, name, sku, tier, storage, shelf });
  document.getElementById('f-brand').value = '';
  document.getElementById('f-name').value = '';
  document.getElementById('f-sku').value = '';
  document.getElementById('f-storage').value = '0';
  document.getElementById('f-shelf').value = '0';
  toggleAddForm();
  render();
}

function removeItem(id) {
  if (!confirm('Remove this item?')) return;
  inventory = inventory.filter(i => i.id !== id);
  render();
}

function filterItems() { renderInventory(); }

function resetAll() {
  if (!confirm('Reset ALL counts to zero?')) return;
  inventory.forEach(i => { i.storage = 0; i.shelf = 0; });
  render();
}

function printInventory() { window.print(); }

// ============================================================
//  INIT
// ============================================================
render();
</script>

</body>
</html>
